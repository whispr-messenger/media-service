name: 🚀 CI Pipeline

on:
  push:
    branches: [main, develop, deploy/preprod]
    paths-ignore:
      - 'k8s/**'
      - '**.md'
      - 'documentation/**'
      - '.github/workflows/cd.yml'
  pull_request:
    branches: [main, develop, deploy/preprod]
    paths-ignore:
      - 'k8s/**'
      - '**.md'
      - 'documentation/**'
      - '.github/workflows/cd.yml'

permissions:
  contents: write
  checks: write
  pull-requests: write
  packages: write
  security-events: write
  actions: read
  attestations: write
  id-token: write

env:
  NODE_VERSION: '20'

jobs:
  # ================================
  # Tests and Quality
  # ================================
  tests:
    name: 🧪 Quality Assurance
    uses: ./.github/workflows/tests.yml
    with:
      ref: ${{ github.ref }}
      should_deploy: ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/deploy/preprod') && github.event_name == 'push' }}
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # ================================
  # Security Scanning
  # ================================
  security:
    name: 🛡️ Security Analysis
    uses: ./.github/workflows/trivy.yml
    with:
      ref: ${{ github.ref }}
      should_deploy: ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/deploy/preprod') && github.event_name == 'push' }}

  # ================================
  # Docker Build
  # ================================
  docker:
    name: 📦 Container Registry
    needs: [security]
    if: ${{ needs.security.result == 'success' }}
    uses: ./.github/workflows/docker.yml
    with:
      ref: ${{ github.ref }}
      should_deploy: ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/deploy/preprod') && github.event_name == 'push' }}

  # ================================
  # Deploy Gate (breaks the uses->uses chain forbidden by GitHub Actions)
  # ================================
  deploy_gate:
    name: 🔒 Deploy Gate
    runs-on: ubuntu-latest
    needs: [docker]
    if: needs.docker.result == 'success' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/deploy/preprod') && github.event_name == 'push'
    steps:
      - run: echo "Docker succeeded, proceeding to deploy"

  # ================================
  # Deploy (only on main push, after Docker succeeds)
  # ================================
  deploy:
    name: 🚀 Deploy
    needs: [deploy_gate]
    uses: ./.github/workflows/cd.yml
    with:
      commit_sha: ${{ github.sha }}
      ref: ${{ github.ref_name }}
    secrets:
      ACTIONS_CD: ${{ secrets.ACTIONS_CD }}
      ACTIONS_CD_PRIVATE_KEY: ${{ secrets.ACTIONS_CD_PRIVATE_KEY }}
