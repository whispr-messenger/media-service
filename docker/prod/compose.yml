#####################################################################################################
# DOCKER COMPOSE FILE FOR WHISPR SCHEDULING SERVICE PRODUCTION ENVIRONMENT                          #
#####################################################################################################
# - This file sets up the production environment with PostgreSQL, Redis, and the media service.     #
# - This configuration depends on a .env file in the same directory for environment variables       #
#   Ensure to create a .env file with the necessary variables before running this setup.            #
#####################################################################################################

name: whispr-media-prod

services:
  postgres:
    image: postgres:15-alpine
    container_name: whispr-media-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_INITDB_ARGS: ${POSTGRES_INITDB_ARGS}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - whispr-network-prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: whispr-media-redis-prod
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
      - ./config/redis.conf:/usr/local/etc/redis/redis.conf
    networks:
      - whispr-network-prod
    healthcheck:
      # test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
        restart: true

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    container_name: whispr-media-minio-dev
    ports:
      - "9000:9000" # API
      - "9001:9001" # Web console
    command: server --console-address ":9001" /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - whispr-network-prod
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  media-service:
    build:
      context: ../../
      dockerfile: ./docker/prod/Dockerfile
      target: production
    # Uncomment to test the image built by the CI pipeline
    # image:  ghcr.io/whispr-messenger/media-service/media-service:sha-f2f060f
    container_name: whispr-media-api-prod
    restart: unless-stopped
    ports:
      - "${HTTP_PORT}:${HTTP_PORT}"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
        restart: true
      redis:
        condition: service_healthy
        restart: true
      minio:
        condition: service_healthy
        restart: true
    networks:
      - whispr-network-prod
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${HTTP_PORT}/media/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local
  redis_data:
    driver: local

networks:
  whispr-network-prod:
    driver: bridge