name: whispr-media

services:
  postgres:
    image: postgres:15-alpine
    container_name: whispr-media-postgres-dev
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_INITDB_ARGS=${POSTGRES_INITDB_ARGS}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT}:${POSTGRES_PORT}"
    networks:
      - whispr-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: whispr-media-redis-dev
    volumes:
      - redis_data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - "${REDIS_PORT}:${REDIS_PORT}"
    networks:
      - whispr-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
        restart: true

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    container_name: whispr-media-minio-dev
    ports:
      - "9000:9000" # API
      - "9001:9001" # Web console
    command: server --console-address ":9001" /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - whispr-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  media-service:
    build:
      context: ../..
      dockerfile: ./docker/dev/Dockerfile
    container_name: whispr-media-api-dev
    env_file:
      - .env
    volumes:
      - ../..:/workspace
      - node_modules_volume:/workspace/node_modules
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /workspace
    # command: sleep infinity  # Keep container running for dev
    ports:
      - "${HTTP_PORT}:${HTTP_PORT}"
      - "9229:9229" # Debugger
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - whispr-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -f http://localhost:${HTTP_PORT}/media/health/ready || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  node_modules_volume:
    driver: local

networks:
  whispr-network:
    driver: bridge
