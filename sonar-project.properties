# Project identification
sonar.projectKey=whispr-messenger_media-service
sonar.projectName=media-service
sonar.projectVersion=1.0
sonar.organization=whispr-messenger

# Source code location
sonar.sources=src
sonar.tests=test
sonar.test.inclusions=**/*.e2e-spec.ts

# TypeScript/JavaScript specific settings
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclusions from analysis
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/*.spec.ts,**/*.e2e-spec.ts,**/migrations/**

# Exclusions from coverage computation
sonar.coverage.exclusions=**/*.spec.ts,**/*.e2e-spec.ts,**/migrations/**,**/main.ts,**/swagger.ts

# Encoding
sonar.sourceEncoding=UTF-8
