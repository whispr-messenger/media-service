# Project identification
sonar.projectKey=whispr-messenger_media-service
sonar.projectName=media-service
sonar.projectVersion=1.0
sonar.organization=whispr-messenger

# Source code location
sonar.sources=src
sonar.tests=test

# TypeScript/JavaScript specific settings
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**

# Test exclusions
sonar.test.exclusions=**/*.spec.ts,**/*.test.ts,**/*.e2e-spec.ts

# Encoding
sonar.sourceEncoding=UTF-8
